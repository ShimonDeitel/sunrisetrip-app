name: SunriseTracker
options:
  bundleIdPrefix: com.shimondeitel.sunrisetrip
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  SunriseTracker:
    type: application
    platform: iOS
    sources:
      - path: SunriseTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sunrisetrip
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: SunriseTracker/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SunriseTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SunriseTrackerTests
      - path: SunriseTracker.storekit
    dependencies:
      - target: SunriseTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sunrisetrip.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SunriseTrackerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SunriseTrackerUITests
    dependencies:
      - target: SunriseTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sunrisetrip.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  SunriseTracker:
    build:
      targets:
        SunriseTracker: all
        SunriseTrackerTests: [test]
        SunriseTrackerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: SunriseTracker.storekit
    test:
      config: Debug
      storeKitConfiguration: SunriseTracker.storekit
      targets:
        - SunriseTrackerTests
        - SunriseTrackerUITests
    archive:
      config: Release
